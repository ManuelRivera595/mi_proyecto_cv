<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Currículum Vitae</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>

    <div class="actions-bar">
        <button class="btn-download" onclick="downloadPDF()">⬇ Descargar en PDF</button>
        <!-- <a href="container.html" class="btn-edit">✏️ Editar Datos</a> -->
    </div>

    <div class="cv-page" id="cv-template">
        <header class="cv-header">
            <h1 class="cv-name" id="cv-name">Tu Nombre</h1>
            <div class="cv-title" id="cv-title">Tu Profesión</div>
            <div class="cv-contact">
                <span id="cv-email"></span> | 
                <span id="cv-phone"></span> | 
                <span id="cv-location"></span>
            </div>
        </header>

        <section class="cv-section">
            <div class="cv-section-title">Perfil Profesional</div>
            <div class="cv-block" id="cv-profile"></div>
        </section>

        <section class="cv-section">
            <div class="cv-section-title">Experiencia Laboral</div>
            <div class="cv-block" id="cv-experience"></div>
        </section>

        <section class="cv-section">
            <div class="cv-section-title">Educación</div>
            <div class="cv-block" id="cv-education"></div>
        </section>

        <section class="cv-section">
            <div class="cv-section-title">Habilidades</div>
            <div class="cv-block" id="cv-skills"></div>
        </section>
        <section class="cv-section">
            <div class="cv-section-title">Diplomas</div>
            <div class="cv-block" id="cv-diplomas"></div>
        </section>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
